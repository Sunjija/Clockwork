<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CLOCKWORK - 림부스 룸 슬라이스</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="game-frame">
    <canvas id="game" width="1280" height="720" tabindex="0" aria-label="림부스 3화면 플레이 테스트"></canvas>
    <div class="area-label" id="areaLabel">추락 지점</div>
    <div class="controls" aria-label="조작키">
      <span><kbd>←</kbd><kbd>→</kbd> 이동</span>
      <span><kbd>Z</kbd> 점프</span>
      <span><kbd>X</kbd> 공격</span>
      <span><kbd>C</kbd> 대시</span>
      <span><kbd>↑</kbd> 조사</span>
      <span><kbd>H</kbd> 충돌 표시</span>
    </div>
    <div class="asset-status">
      <span>1280×720</span>
      <span>IMAGE BACKGROUND</span>
      <span>ORIGINAL TIQUE FRAMES</span>
      <span id="cameraReadout">ROOM 3/3</span>
    </div>
    <button class="icon-button" id="resetButton" type="button" title="처음부터 다시 시작" aria-label="처음부터 다시 시작">↺</button>
    <button class="icon-button fullscreen" id="fullscreenButton" type="button" title="전체 화면" aria-label="전체 화면">⛶</button>
    <div class="loading" id="loading">배경과 티크 애니메이션을 불러오는 중</div>
    <div class="message" id="message" hidden></div>
  </main>
  <script src="game.js"></script>
</body>
</html>
